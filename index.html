<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drive Markdown Reader</title>
    <link rel="stylesheet" href="styles.css?v=3" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="./">Drive Markdown Reader</a>
      <div class="actions">
        <button id="back" class="button" type="button" disabled>← Back</button>
        <button id="edit" class="button" type="button" disabled>Edit</button>
        <button id="discard" class="button" type="button" hidden>Discard</button>
        <button id="save" class="button primary" type="button" hidden>Save</button>
        <button id="open-file" class="button" type="button">Open from Drive</button>
        <button id="connect" class="button primary" type="button">Connect Google Drive</button>
      </div>
    </header>

    <main class="layout">
      <aside class="sidebar" aria-label="Document navigation">
        <p class="eyebrow">DRIVE NOTES</p>
        <p id="connection-status" class="muted">Connect your Drive to get started.</p>
        <form id="search-form" class="search-form">
          <label for="search">Find a note</label>
          <input id="search" type="search" placeholder="Search markdown files" autocomplete="off" />
        </form>
        <div id="results" class="results" aria-live="polite"></div>
        <section class="recent-section" aria-labelledby="recent-heading">
          <h2 id="recent-heading">Recently opened</h2>
          <div id="recent" class="results"></div>
        </section>
      </aside>

      <article class="reader">
        <div id="empty-state" class="empty-state">
          <h1>Your notes, available anywhere.</h1>
          <p>Open a Markdown file from Drive, or connect Drive and search your vault.</p>
          <p class="muted">Edits are manual and checked for Drive changes before saving.</p>
        </div>
        <div id="document" class="document" hidden></div>
      </article>
    </main>

    <template id="result-template">
      <button class="result" type="button">
        <span class="result-name"></span>
        <span class="result-path"></span>
      </button>
    </template>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
    <script src="config.js?v=3"></script>
    <script src="app.js?v=3"></script>
  </body>
</html>
